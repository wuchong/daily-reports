name: Data+AI Daily Report

on:
  schedule:
    - cron: '0 0 * * *'  # UTC 00:00 = Beijing 08:00
  workflow_dispatch:
    inputs:
      date:
        description: '报告日期 (YYYY-MM-DD), 留空则为昨天'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests feedparser openai pyyaml

      - name: Calculate date
        id: date
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            echo "date=${{ github.event.inputs.date }}" >> $GITHUB_OUTPUT
          else
            echo "date=$(date -d 'yesterday' +%Y-%m-%d)" >> $GITHUB_OUTPUT
          fi

      - name: Search news
        env:
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          REPORT_DATE: ${{ steps.date.outputs.date }}
        run: python scripts/data-ai/search_news.py

      - name: Generate summary with LLM
        env:
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/data-ai/generate_summary.py

      - name: Generate reports
        env:
          GITHUB_PAGES_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
        run: python scripts/data-ai/generate_report.py

      - name: Send to DingTalk
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
          GITHUB_PAGES_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
        run: python scripts/data-ai/send_dingtalk.py

      - name: Deploy to pages branch
        run: |
          # Save data-ai docs to temp
          cp -r docs/data-ai /tmp/data-ai-output
          mkdir -p /tmp/data-ai-output/assets
          cp assets/data-ai/style.css /tmp/data-ai-output/assets/
          cp assets/index.html /tmp/index-template.html

          # Remove existing content
          rm -rf docs/* *.json || true

          # Checkout pages branch
          git fetch origin pages || true
          if git show-ref --verify --quiet refs/remotes/origin/pages; then
            git checkout pages
          else
            git checkout --orphan pages
            git rm -rf . || true
          fi

          # Merge data-ai content (preserve fluss-github)
          rm -rf data-ai || true
          cp -r /tmp/data-ai-output data-ai

          # Update root index.html from template
          cp /tmp/index-template.html index.html

          # Commit and push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "chore: add data-ai daily report for ${{ steps.date.outputs.date }}"
          git push origin pages
