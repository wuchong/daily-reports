name: Iceberg Dev Weekly Report

on:
  schedule:
    - cron: '0 23 * * 1'  # UTC 23:00 Monday = Beijing 07:00 Tuesday
  workflow_dispatch:
    inputs:
      week:
        description: '报告周数 (YYYY-Www), 留空则为上一周'
        required: false
        default: ''

permissions:
  contents: write

env:
  PROJECT_NAME: Iceberg
  PROJECT_ID: iceberg-dev
  LIST_NAME: dev
  LIST_DOMAIN: iceberg.apache.org

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests aiohttp openai

      - name: Calculate week
        id: week
        run: |
          if [ -n "${{ github.event.inputs.week }}" ]; then
            echo "week=${{ github.event.inputs.week }}" >> $GITHUB_OUTPUT
          else
            echo "week=$(date -d 'last monday - 7 days' +%G-W%V)" >> $GITHUB_OUTPUT
          fi

      - name: Fetch emails
        env:
          REPORT_WEEK: ${{ steps.week.outputs.week }}
        run: python scripts/mailing-list/fetch_emails.py

      - name: Classify emails
        run: python scripts/mailing-list/classify_emails.py

      - name: Generate summary with LLM
        env:
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/mailing-list/generate_summary.py

      - name: Generate reports
        env:
          GITHUB_PAGES_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
        run: python scripts/mailing-list/generate_report.py --skip-index

      - name: Send to DingTalk
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
          GITHUB_PAGES_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
        run: python scripts/mailing-list/send_dingtalk.py

      - name: Deploy to pages branch
        env:
          GITHUB_PAGES_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
        run: |
          # Save iceberg-dev docs to temp
          cp -r docs/iceberg-dev /tmp/iceberg-dev-output
          mkdir -p /tmp/iceberg-dev-output/assets
          cp assets/mailing-list/style.css /tmp/iceberg-dev-output/assets/
          cp assets/index.html /tmp/index-template.html
          
          # Copy scripts for index generation
          cp scripts/mailing-list/generate_report.py /tmp/generate_report.py

          # Remove existing content
          rm -rf docs/* *.json || true

          # Checkout pages branch
          git fetch origin pages || true
          if git show-ref --verify --quiet refs/remotes/origin/pages; then
            git checkout pages
          else
            git checkout --orphan pages
            git rm -rf . || true
          fi

          # Merge iceberg-dev content (create dir if not exists)
          mkdir -p iceberg-dev/reports
          mkdir -p iceberg-dev/assets
          cp -r /tmp/iceberg-dev-output/* iceberg-dev/
          
          # Generate index.html and RSS feed with all historical reports
          mkdir -p docs/iceberg-dev
          ln -sf $(pwd)/iceberg-dev/reports docs/iceberg-dev/reports
          python /tmp/generate_report.py --index-only
          cp docs/iceberg-dev/index.html iceberg-dev/
          cp docs/iceberg-dev/feed.xml iceberg-dev/
          rm -rf docs

          # Update root index.html from template
          cp /tmp/index-template.html index.html

          # Commit and push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "chore: add iceberg-dev weekly report for ${{ steps.week.outputs.week }}"
          git push origin pages
