name: Fluss Dev Weekly Report

on:
  schedule:
    - cron: '0 23 * * 4'  # UTC 23:00 Thursday = Beijing 07:00 Friday
  workflow_dispatch:
    inputs:
      week:
        description: '报告周数 (YYYY-Www), 留空则为上一周'
        required: false
        default: ''

permissions:
  contents: write

env:
  PROJECT_NAME: Fluss
  PROJECT_ID: fluss-dev
  LIST_NAME: dev
  LIST_DOMAIN: fluss.apache.org

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests aiohttp openai

      - name: Calculate week
        id: week
        run: |
          if [ -n "${{ github.event.inputs.week }}" ]; then
            echo "week=${{ github.event.inputs.week }}" >> $GITHUB_OUTPUT
          else
            echo "week=$(date -d 'last monday - 7 days' +%G-W%V)" >> $GITHUB_OUTPUT
          fi

      - name: Fetch emails
        env:
          REPORT_WEEK: ${{ steps.week.outputs.week }}
        run: python scripts/mailing-list/fetch_emails.py

      - name: Classify emails
        run: python scripts/mailing-list/classify_emails.py

      - name: Generate summary with LLM
        env:
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/mailing-list/generate_summary.py

      - name: Generate reports
        env:
          GITHUB_PAGES_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
        run: python scripts/mailing-list/generate_report.py

      - name: Send to DingTalk
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
          GITHUB_PAGES_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
        run: python scripts/mailing-list/send_dingtalk.py

      - name: Deploy to pages branch
        run: |
          # Save fluss-dev docs to temp
          cp -r docs/fluss-dev /tmp/fluss-dev-output
          mkdir -p /tmp/fluss-dev-output/assets
          cp assets/mailing-list/style.css /tmp/fluss-dev-output/assets/
          cp assets/index.html /tmp/index-template.html

          # Remove existing content
          rm -rf docs/* *.json || true

          # Checkout pages branch
          git fetch origin pages || true
          if git show-ref --verify --quiet refs/remotes/origin/pages; then
            git checkout pages
          else
            git checkout --orphan pages
            git rm -rf . || true
          fi

          # Merge fluss-dev content (create dir if not exists)
          mkdir -p fluss-dev/reports
          mkdir -p fluss-dev/assets
          cp -r /tmp/fluss-dev-output/* fluss-dev/

          # Update root index.html from template
          cp /tmp/index-template.html index.html

          # Commit and push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "chore: add fluss-dev weekly report for ${{ steps.week.outputs.week }}"
          git push origin pages
