name: Daily Report

on:
  schedule:
    - cron: '0 1 * * *'  # UTC 01:00 = Beijing 09:00
  workflow_dispatch:
    inputs:
      date:
        description: '报告日期 (YYYY-MM-DD), 留空则为昨天'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Calculate date
        id: date
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            echo "date=${{ github.event.inputs.date }}" >> $GITHUB_OUTPUT
          else
            echo "date=$(date -d 'yesterday' +%Y-%m-%d)" >> $GITHUB_OUTPUT
          fi
      
      - name: Collect GitHub data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/collect_data.sh ${{ steps.date.outputs.date }}
      
      - name: Generate summary with Claude
        env:
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/generate_summary.py
      
      - name: Generate reports
        env:
          GITHUB_PAGES_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
        run: python scripts/generate_report.py
      
      - name: Send to DingTalk
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
        run: python scripts/send_dingtalk.py
      
      - name: Deploy to pages branch
        run: |
          # Save docs to temp
          cp -r docs /tmp/docs-output
          
          # Checkout or create pages branch
          git fetch origin pages || true
          if git show-ref --verify --quiet refs/remotes/origin/pages; then
            git checkout pages
          else
            git checkout --orphan pages
            git rm -rf . || true
          fi
          
          # Copy docs content to root
          rm -rf reports assets index.html || true
          cp -r /tmp/docs-output/* .
          
          # Commit and push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "chore: add daily report for ${{ steps.date.outputs.date }}"
          git push origin pages
